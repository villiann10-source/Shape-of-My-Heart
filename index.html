<!DOCTYPE html>
<html lang="my">
<head>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400..700&display=swap" rel="stylesheet">
   
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400..700&family=Lobster+Two:ital,wght@0,400;0,700;1,400;1,700&family=Noto+Serif+Myanmar:wght@100;200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Will You Be Mine?</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Lobster&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(135deg, #fbc2eb 0%, #a6c1ee 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            touch-action: none;
        }

        /* ၁။ အဝင် Overlay */
        #entryOverlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #fbc2eb;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 999;
            transition: 0.5s;
        }

        .heart-btn {
            background: #ff4d6d;
            width: 100px;
            height: 100px;
            position: relative;
            transform: rotate(-45deg);
            cursor: pointer;
            border: none;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            animation: beat 1.2s infinite;
        }

        .heart-btn::before, .heart-btn::after {
            content: "";
            background: #ff4d6d;
            border-radius: 50%;
            width: 100px;
            height: 100px;
            position: absolute;
        }

        .heart-btn::before { top: -50px; left: 0; }
        .heart-btn::after { left: 50px; top: 0; }

        .click-text {
            margin-top: 80px;
            color: white;
            font-weight: bold;
            font-size: 1.2rem;
            letter-spacing: 2px;
        }

        @keyframes beat {
            0% { transform: scale(1) rotate(-45deg); }
            50% { transform: scale(1.1) rotate(-45deg); }
            100% { transform: scale(1) rotate(-45deg); }
        }

        /* ၂။ Main Card */
        .card {
            background: rgba(255, 255, 255, 0.95);
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            text-align: center;
            width: 320px;
            display: none;
            position: relative;
            z-index: 100;
        }

        .gif-container img { width: 150px; margin-bottom: 20px; }
        h1 { color: #ff4d6d; font-size: 1.8rem; margin-bottom: 30px; white-space: pre-line; font-family: 'Dancing Script', cursive; }

        .btn-group { display: flex; justify-content: center; gap: 25px; }
        button.action-btn {
            padding: 12px 30px;
            font-size: 1.1rem;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: 0.3s;
        }
        #yesBtn { background-color: #ff4d6d; color: white; }
        #noBtn { background-color: #6c757d; color: white; position: relative; }

        /* ၃။ Falling Elements Style */
        .falling-element {
            position: fixed;
            top: -100px;
            pointer-events: none;
            z-index: 50;
        }

        /* စာသားတွေအတွက် Animation (Rotate မပါတော့ပါ) */
        .falling-text {
            color: #ffffff;
            text-shadow: 0 0 8px #ff4d6d, 0 0 15px #ff758f;
            font-family: "Dancing Script", cursive;
            white-space: nowrap;
            animation: fallSimple linear forwards;
        }

        /* နှင်းဆီပွင့်ဖတ်အတွက် Animation (ဒါကတော့ ဝဲကျတာလှလို့ rotate ထားပါတယ်) */
        .rose-petal {
            background: #ff4d6d;
            border-radius: 0 80% 0 80%;
            opacity: 0.8;
            box-shadow: 1px 1px 4px rgba(0,0,0,0.1);
            animation: fallSway linear forwards;
        }

        @keyframes fallSimple {
            0% { transform: translateY(0) translateX(0); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(115vh) translateX(20px); opacity: 0; }
        }

        @keyframes fallSway {
            0% { transform: translateY(0) rotate(0deg) translateX(0); opacity: 0; }
            10% { opacity: 1; }
            100% { transform: translateY(115vh) rotate(360deg) translateX(-30px); opacity: 0; }
        }

        /* ၄။ Fireworks Style */
        .firework {
            position: absolute;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            pointer-events: none;
            z-index: 10;
            animation: explode 1.5s ease-out forwards;
        }

        @keyframes explode {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: translate(var(--x), var(--y)) scale(0.1); opacity: 0; }
        }

        #questionText{
            font-family: "Noto Serif Myanmar", serif;
            font-size: 24px;
        }
    </style>
</head>
<body>

    <div id="entryOverlay">
        <button class="heart-btn" onclick="startApp()"></button>
        <p class="click-text">CLICK ME ❤️</p>
    </div>

    <audio id="bgMusic" loop>
        <source src="https://github.com/villiann10-source/Love/raw/refs/heads/main/proposalsource1.mp3" type="audio/mpeg">
    </audio>

    <div class="card" id="mainCard">
        <div class="gif-container">
            <img id="displayImg" src="https://media.tenor.com/2xXSveH84lIAAAAM/wake-up.gif" alt="cute bear">
        </div>
        <h1 id="questionText">ညီမကောင်လေးဖြစ်ပေးနိုင်မလား အကို❤️</h1>
        <div class="btn-group">
            <button id="yesBtn" class="action-btn">ဟုတ်</button>
            <button id="noBtn" class="action-btn">နိုးးး</button>
        </div>
    </div>

    <script>
        const music = document.getElementById('bgMusic');
        
        function startApp() {
            document.getElementById('entryOverlay').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('entryOverlay').style.display = 'none';
                document.getElementById('mainCard').style.display = 'block';
            }, 500);
            music.play();
        }

        const noBtn = document.getElementById('noBtn');
        noBtn.addEventListener('mouseover', () => {
            const x = Math.random() * (window.innerWidth - noBtn.offsetWidth);
            const y = Math.random() * (window.innerHeight - noBtn.offsetHeight);
            noBtn.style.position = 'fixed';
            noBtn.style.left = x + 'px';
            noBtn.style.top = y + 'px';
        });

        document.getElementById('yesBtn').addEventListener('click', () => {
            document.getElementById('questionText').innerHTML = "Yeayyy! I knew it! 💖\nI love you so much!";
            document.getElementById('displayImg').src = "https://media.tenor.com/_1xqhO5RzVYAAAAm/i-miss-you-bear-milk-and-mocha.webp";
            document.getElementById('yesBtn').style.display = 'none';
            document.getElementById('noBtn').style.display = 'none';

            startEffects();
        });

        function startEffects() {
            // ၁။ စာသားများ (Rotate မပါဘဲ ကျလာခြင်း)
            const messages = ["Shape of My Heart", "Let me show u", "I love you", "You're Mine"];
            setInterval(() => {
                const textWrap = document.createElement('div');
                textWrap.className = 'falling-element falling-text';
                textWrap.innerText = messages[Math.floor(Math.random() * messages.length)];
                textWrap.style.left = Math.random() * 90 + "vw";
                textWrap.style.fontSize = (Math.random() * 15 + 28) + "px";
                textWrap.style.animationDuration = (Math.random() * 3 + 5) + "s";
                document.body.appendChild(textWrap);
                setTimeout(() => textWrap.remove(), 7000);
            }, 600);

            // ၂။ နှင်းဆီပွင့်ဖတ်များ
            setInterval(() => {
                const petal = document.createElement('div');
                petal.className = 'falling-element rose-petal';
                const size = Math.random() * 15 + 10;
                petal.style.width = size + 'px';
                petal.style.height = (size + 5) + 'px';
                petal.style.left = Math.random() * 100 + "vw";
                petal.style.animationDuration = (Math.random() * 4 + 3) + "s";
                const colors = ['#ff4d6d', '#ff758f', '#c9184a', '#ffb3c1'];
                petal.style.background = colors[Math.floor(Math.random() * colors.length)];
                document.body.appendChild(petal);
                setTimeout(() => petal.remove(), 7000);
            }, 200);

            // ၃။ မီးရှူးမီးပန်း
            setInterval(() => {
                createFirework(Math.random() * window.innerWidth, Math.random() * window.innerHeight);
            }, 600);
        }

        function createFirework(x, y) {
            const colors = ['#ff4d6d', '#ffb703', '#00b4d8', '#9d4edd', '#ffffff', '#fb5607'];
            const color = colors[Math.floor(Math.random() * colors.length)];
            for (let i = 0; i < 40; i++) {
                const f = document.createElement('div');
                f.className = 'firework';
                f.style.left = x + 'px';
                f.style.top = y + 'px';
                f.style.background = color;
                f.style.boxShadow = `0 0 10px ${color}, 0 0 20px ${color}`;
                const angle = Math.random() * Math.PI * 2;
                const velocity = Math.random() * 350 + 100;
                const vx = Math.cos(angle) * velocity;
                const vy = Math.sin(angle) * velocity;
                f.style.setProperty('--x', vx + 'px');
                f.style.setProperty('--y', vy + 'px');
                document.body.appendChild(f);
                setTimeout(() => f.remove(), 1500);
            }
        }
    </script>
</body>
</html>
